<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradPrimary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#0f6fff" />
      <stop offset="100%" stopColor="#06b6d4" />
    </linearGradient>
    <linearGradient id="logoGradSecondary" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stopColor="#3b82f6" />
      <stop offset="100%" stopColor="#8b5cf6" />
    </linearGradient>
  </defs>
  
  <!-- Left Pillar / NGO representing foundation -->
  <rect x="25" y="45" width="18" height="50" rx="6" fill="url(#logoGradPrimary)" />
  
  <!-- Right Pillar / Volunteer representing growth -->
  <rect x="77" y="35" width="18" height="60" rx="6" fill="url(#logoGradSecondary)" />
  
  <!-- The Bridge Arch connecting both pillars -->
  <path d="M 34 50 C 50 15, 70 15, 86 40" stroke="url(#logoGradPrimary)" stroke-width="14" stroke-linecap="round" fill="none" />
  
  <!-- The Spark / Skill ascending -->
  <circle cx="95" cy="22" r="8" fill="#f59e0b" />
</svg>
